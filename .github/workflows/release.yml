name: Build & Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -e .
          pip install pyinstaller packaging

      - name: Download vendor binaries (yt-dlp + ffmpeg + ffprobe)
        run: python scripts/fetch_vendor_bins.py

      - name: Build exe with PyInstaller
        run: pyinstaller youtok.spec --noconfirm

      - name: Create release archive
        shell: pwsh
        run: |
          Compress-Archive -Path dist/youtok/* -DestinationPath youtok-windows-x64.zip

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            youtok-windows-x64.zip
          tag_name: ${{ github.ref_name || 'v0.1.0' }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

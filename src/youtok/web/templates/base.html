<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Youtok{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.3"></script>
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'bg-deep': '#0A0E27',
            'bg-mid': '#151B3D',
            'accent-purple': '#A855F7',
            'accent-pink': '#EC4899',
          },
          fontFamily: { sans: ['Inter', 'system-ui'] },
        },
      },
    };
  </script>
  <style>
    .glass {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
    }
    .gradient-btn {
      background: linear-gradient(135deg, #A855F7 0%, #EC4899 100%);
    }
    .gradient-btn:hover { filter: brightness(1.15); }
  </style>
</head>
<body class="bg-bg-deep text-white min-h-screen relative font-sans">
  <!-- Floating orbs background -->
  <div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
    <div class="absolute -top-40 -left-40 w-96 h-96 bg-accent-purple/30 rounded-full blur-3xl"></div>
    <div class="absolute top-1/2 right-0 w-96 h-96 bg-accent-pink/20 rounded-full blur-3xl"></div>
    <div class="absolute -bottom-40 left-1/3 w-96 h-96 bg-accent-purple/20 rounded-full blur-3xl"></div>
  </div>

  {% block nav %}
  {% if show_nav %}
  <nav class="glass mx-6 mt-6 rounded-2xl px-6 py-4 flex items-center justify-between">
    <a href="/dashboard" class="text-2xl font-bold bg-gradient-to-r from-accent-purple to-accent-pink bg-clip-text text-transparent">Youtok</a>
    <div class="flex gap-4 items-center">
      <div id="update-badge"></div>
      <a href="/dashboard" class="hover:text-accent-pink transition">Dashboard</a>
      <a href="/history" class="hover:text-accent-pink transition">History</a>
      <a href="/settings" class="hover:text-accent-pink transition">Settings</a>
      <a href="/jobs/new" class="gradient-btn px-4 py-2 rounded-lg font-semibold transition">+ New Job</a>
    </div>
  </nav>
  {% endif %}
  {% endblock %}

  <!-- Post-update banner (like Veo Farm's UpdatedBanner) -->
  <div id="updated-banner" class="hidden mx-6 mt-3 rounded-xl px-4 py-3 flex items-center justify-between text-sm"
       style="background: linear-gradient(135deg, rgba(234,179,8,0.15), rgba(249,115,22,0.15)); border: 1px solid rgba(234,179,8,0.3);">
    <div class="flex items-center gap-2">
      <span>✨</span>
      <span class="font-semibold text-yellow-200" id="updated-banner-text"></span>
    </div>
    <button onclick="document.getElementById('updated-banner').classList.add('hidden')"
            class="text-white/40 hover:text-white text-lg leading-none ml-4">&times;</button>
  </div>

  <main class="container mx-auto px-6 py-8">
    {% block content %}{% endblock %}
  </main>

  <!-- Update Badge -->
  <script>
  (function() {
    const badge = document.getElementById('update-badge');
    if (!badge) return;

    let state = { status: 'idle', current_version: '' };

    function render() {
      const s = state;
      const v = s.current_version;

      if (s.status === 'downloaded') {
        badge.innerHTML = `
          <button onclick="ytUpdateInstall()" class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-md text-xs font-semibold text-white animate-pulse"
                  style="background: linear-gradient(135deg, #f97316, #ec4899); box-shadow: 0 4px 14px rgba(249,115,22,0.3);"
                  title="Có bản v${s.latest_version} — bấm để cài">
            ✨ Update v${s.latest_version}
          </button>`;
        return;
      }

      if (s.status === 'checking') {
        badge.innerHTML = `
          <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-md text-xs text-white/50" style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);">
            <span class="animate-spin inline-block w-3 h-3 border border-white/40 border-t-transparent rounded-full"></span>
            Đang kiểm tra...
          </span>`;
        return;
      }

      if (s.status === 'downloading') {
        badge.innerHTML = `
          <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-md text-xs text-accent-pink" style="background:rgba(236,72,153,0.1);border:1px solid rgba(236,72,153,0.3);">
            <span class="animate-spin inline-block w-3 h-3 border border-accent-pink/60 border-t-transparent rounded-full"></span>
            Đang tải v${s.latest_version} (${s.download_percent || 0}%)
          </span>`;
        return;
      }

      if (s.status === 'available') {
        badge.innerHTML = `
          <button onclick="ytUpdateDownload()" class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-md text-xs font-semibold text-white"
                  style="background: linear-gradient(135deg, #f97316, #ec4899);"
                  title="Có bản mới v${s.latest_version} — bấm để tải">
            ⬇ Tải v${s.latest_version}
          </button>`;
        return;
      }

      if (s.status === 'error') {
        badge.innerHTML = `
          <button onclick="ytUpdateCheck()" class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-md text-xs text-red-300 hover:bg-red-500/20 transition"
                  style="background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);"
                  title="Update lỗi — bấm thử lại">
            ⚠ Update lỗi
          </button>`;
        return;
      }

      // idle
      badge.innerHTML = `
        <button onclick="ytUpdateCheck()" class="group inline-flex items-center gap-1.5 px-2.5 py-1 rounded-md text-xs text-white/50 hover:text-white/70 transition"
                style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);"
                title="${v ? 'Đang chạy v' + v + ' — bấm để kiểm tra update' : 'Kiểm tra update'}">
          ${v ? '<span class="font-mono text-white/60">v' + v + '</span>' : ''}
          <span class="inline-block w-3 h-3 group-hover:rotate-180 transition-transform duration-500">↻</span>
          <span class="hidden md:inline">Kiểm tra</span>
        </button>`;
    }

    async function fetchStatus() {
      try {
        const r = await fetch('/update/status');
        if (r.ok) { state = await r.json(); render(); }
      } catch(e) {}
    }

    window.ytUpdateCheck = async function() {
      state.status = 'checking'; render();
      try {
        const r = await fetch('/update/check', {method:'POST'});
        const d = await r.json();
        await fetchStatus();
        if (!d.update_available && !d.error) {
          state.status = 'idle'; render();
          badge.querySelector('button').title = 'Đã là bản mới nhất!';
        }
      } catch(e) { state.status = 'error'; state.error_message = e.message; render(); }
    };

    window.ytUpdateDownload = async function() {
      try {
        await fetch('/update/download', {method:'POST'});
        pollDownload();
      } catch(e) {}
    };

    window.ytUpdateInstall = function() {
      if (!confirm('App sẽ tắt và khởi động lại bản mới. Tiếp tục?')) return;
      fetch('/update/install', {method:'POST'});
      badge.innerHTML = '<span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-md text-xs text-accent-pink">Đang cài đặt... App sẽ restart</span>';
    };

    function pollDownload() {
      const iv = setInterval(async () => {
        await fetchStatus();
        if (state.status !== 'downloading') clearInterval(iv);
      }, 1000);
    }

    fetchStatus();
    setInterval(fetchStatus, 30 * 60 * 1000);

    // Post-update banner (like Veo Farm's UpdatedBanner)
    (async function() {
      try {
        const r = await fetch('/update/just-updated');
        if (!r.ok) return;
        const d = await r.json();
        if (!d.updated) return;
        const banner = document.getElementById('updated-banner');
        const text = document.getElementById('updated-banner-text');
        if (!banner || !text) return;
        text.textContent = 'Đã cập nhật lên v' + d.to + (d.from ? ' (từ v' + d.from + ')' : '');
        banner.classList.remove('hidden');
      } catch(e) {}
    })();
  })();
  </script>

  <!-- Update confirm modal -->
  <div id="update-confirm-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden items-center justify-center">
    <div class="glass rounded-xl max-w-md w-full mx-4 p-5">
      <div class="flex items-start gap-3">
        <span class="text-xl">✨</span>
        <div class="flex-1">
          <h2 class="text-base font-semibold" id="update-modal-title">Có bản cập nhật mới</h2>
          <p class="text-xs text-white/60 mt-1">App sẽ đóng và cài đặt ngay.</p>
        </div>
      </div>
      <div class="mt-4 flex items-center gap-2 px-3 py-2 rounded-md text-xs text-yellow-300" style="background:rgba(234,179,8,0.1);border:1px solid rgba(234,179,8,0.3);">
        ⚠ Vui lòng đợi mọi job đang chạy hoàn tất trước khi cập nhật.
      </div>
      <div class="mt-5 flex justify-end gap-2">
        <button onclick="document.getElementById('update-confirm-modal').classList.add('hidden')"
                class="glass px-4 py-1.5 rounded-md text-xs">Huỷ</button>
        <button onclick="ytUpdateInstall()"
                class="px-4 py-1.5 rounded-md text-xs font-semibold text-white"
                style="background: linear-gradient(135deg, #f97316, #ec4899);">Update ngay</button>
      </div>
    </div>
  </div>
</body>
</html>

<div class="space-y-4">
  <div class="glass rounded-xl p-4 max-h-96 overflow-y-auto">
    <div class="flex items-center justify-between mb-2">
      <span class="text-sm text-white/60">{{ videos|length }} videos found</span>
      <button type="button" onclick="toggleAll()" class="text-xs text-accent-pink">Toggle all</button>
    </div>
    {% for v in videos %}
    <label class="flex items-center gap-3 py-2 hover:bg-white/5 rounded">
      <input type="checkbox" name="selected_video_urls" value="{{ v.url }}" checked>
      <div class="flex-1">
        <div class="text-sm">{{ v.title }}</div>
        <div class="text-xs text-white/40">{% if v.duration_sec %}{{ "%.0f"|format(v.duration_sec / 60) }}min{% else %}? min{% endif %} · {{ v.upload_date or '?' }}</div>
      </div>
    </label>
    {% endfor %}
  </div>

  <button type="button" onclick="sendToBulk()" id="channel-submit-btn" class="gradient-btn px-6 py-2 rounded-lg font-semibold">Chuyển {{ videos|length }} URL sang Bulk</button>
</div>

<script>
  function updateCount() {
    const n = document.querySelectorAll('input[name="selected_video_urls"]:checked').length;
    document.getElementById('channel-submit-btn').textContent = 'Chuyển ' + n + ' URL sang Bulk';
  }
  document.querySelectorAll('input[name="selected_video_urls"]').forEach(cb => cb.addEventListener('change', updateCount));
  updateCount();

  function toggleAll() {
    const cbs = document.querySelectorAll('input[name="selected_video_urls"]');
    const allChecked = Array.from(cbs).every(cb => cb.checked);
    cbs.forEach(cb => cb.checked = !allChecked);
    updateCount();
  }

  function sendToBulk() {
    const urls = Array.from(document.querySelectorAll('input[name="selected_video_urls"]:checked'))
      .map(cb => cb.value).join('\n');
    if (!urls) return;
    showTab('bulk');
    const ta = document.querySelector('#tab-bulk textarea[name="urls"]');
    if (ta) {
      ta.value = urls;
      ta.dispatchEvent(new Event('input'));
    }
  }
</script>
